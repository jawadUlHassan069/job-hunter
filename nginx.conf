events {
    worker_connections 1024;
}

http {
    # ── upstream = the two Django instances ────────────
    upstream django_backend {
        server django1:8000;    # container name from docker-compose
        server django2:8000;    # nginx round-robins between these two
    }

    server {
        listen 80;

        # ── API requests → Django ───────────────────────
        location /api/ {
            proxy_pass         http://django_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

            # show which instance handled the request
            # useful for proving load balancing works
            add_header         X-Instance-ID     $upstream_addr;
        }

        # ── Django admin ────────────────────────────────
        location /admin/ {
            proxy_pass         http://django_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
        }

        # ── Media files (uploaded CVs) ──────────────────
        location /media/ {
            alias /media/;      # served directly by nginx, not Django
        }

        # ── React frontend ──────────────────────────────
        location / {
            proxy_pass         http://frontend:5173;
            proxy_set_header   Host              $host;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            # ↑ these two lines needed for Vite's hot reload to work
        }
    }
}